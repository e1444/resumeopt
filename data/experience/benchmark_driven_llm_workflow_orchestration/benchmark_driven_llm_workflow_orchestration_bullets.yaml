project_id: benchmark_driven_llm_workflow_orchestration
project_title: Benchmark-Driven LLM Workflow Orchestration
role_context: Independent AI Systems Project
dates: July 2026--Present
resume_section: PROJECTS
project_summary: This project is a resume optimization tool that extracts skills from job postings and tailors a resume's skills section to match the job posting. It uses a staged LLM pipeline to extract relevant skills and generate tailored resume bullets. The tool is designed to help job seekers improve their chances of getting noticed by recruiters and hiring managers. The backend is built using Python and FastAPI, with a React frontend. The tool is designed to be user-friendly and efficient, allowing users to quickly generate tailored resume bullets based on the job posting they are applying for.
bullets:
- id: benchmark_driven_llm_workflow_orchestration_b1
  order: 0
  position: start
  text: Built a staged LLM workflow for extracting resume-relevant technical skills from real-world job
    postings, improving F1 from 89.8% +/- 2.8% with a single-shot frontier-model baseline to 94.5% +/-
    2.2% using staged orchestration.
  fact_ids:
  - benchmark_driven_llm_workflow_orchestration_pipeline_staged_001
  - benchmark_driven_llm_workflow_orchestration_eval_staged_f1_001
- id: benchmark_driven_llm_workflow_orchestration_b2
  order: 1
  position: middle
  text: Prioritized robustness over free-form generation using grounded extraction, structured validation,
    human-in-the-loop review, canonical skill-cache, and evidence-backed skill selection.
  fact_ids:
  - benchmark_driven_llm_workflow_orchestration_matcher_llm_grounding_001
  - benchmark_driven_llm_workflow_orchestration_review_checkpoint_001
  - benchmark_driven_llm_workflow_orchestration_cache_canonical_001
- id: benchmark_driven_llm_workflow_orchestration_b3
  order: 2
  position: middle
  text: Used benchmark-driven development and ablation studies to guide parser architecture, model tier,
    batching, reasoning effort, prompt schema, and precision-recall-cost tradeoffs.
  fact_ids:
  - benchmark_driven_llm_workflow_orchestration_eval_staged_f1_001
  - benchmark_driven_llm_workflow_orchestration_eval_parser_designs_001
- id: benchmark_driven_llm_workflow_orchestration_b4
  order: 3
  position: end
  text: Developed a FastAPI and React interface for progress tracking, intermediate-artifact inspection,
    skill review, missing-skill promotion, and controlled LaTeX/PDF re-rendering.
  fact_ids:
