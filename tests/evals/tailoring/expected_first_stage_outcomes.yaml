# DRAFT ground truth - NOT yet human-reviewed. Per AGENTS.md Human Review
# Gates (eval ground truth requires review) and the dev plan's Phase 0 task
# 7 ("Create human-reviewed expected outcomes for only the first measurable
# stages"), treat every label/rationale below as a proposal for the human
# reviewer, not an approved contract. Phase 1 (slot triage) and Phase 2
# (project fact retrieval) implementations must not be built against this
# file until it is reviewed and confirmed/edited.
#
# Scoped to a single active project (2026-07-20, explicit user decision):
# constrained_optimization_for_generative_classification is the only
# project currently in data/experience/resume_manifest.yaml, so every
# example below uses only that project's 4 bullets. A new ml_research.txt
# posting was added specifically because none of the original 3 postings
# (frontend/product, backend/platform, LLM/ML-infra) gives this project's
# bullets a genuine "keep" match on their own - without an ML-research-
# aligned posting, this fixture set would only ever exercise
# candidate_for_replacement/deprioritize/idk, never a strong keep case.
#
# Ambiguity-handling policy (explicit, two complementary mechanisms, per
# explicit user decision 2026-07-21): a genuinely ambiguous pairing lists
# MULTIPLE permitted `expected_labels` rather than forcing one answer, AND
# tests/tailoring/triage_benchmark.py's aggregate result is judged against
# a MIN_AGREEMENT_RATE below 100% (see that script), not exact agreement on
# every case. Do not "fix" a below-100% run by further loosening fixture
# labels to chase a perfect score - a real disagreement on a fixture this
# small is expected classifier variance, not necessarily a bug, unless
# term-level inspection finds a concrete defect (see e.g. the label/
# rationale self-contradiction bug this benchmark did catch and fix).
_review_status: draft_needs_human_review

postings:
  - id: ml_research
    path: tests/evals/tailoring/job_postings/ml_research.txt
    domain_emphasis: ML research (generative modeling, constrained optimization, calibration)
  - id: frontend_product
    path: tests/evals/tailoring/job_postings/frontend_product.txt
    domain_emphasis: frontend/product
  - id: backend_platform
    path: tests/evals/sample_job_posting_big2.txt
    domain_emphasis: backend/platform (entry-level general SWE)
  - id: llm_ml_infra
    path: tests/evals/sample_job_posting_big4.txt
    domain_emphasis: LLM/ML-infrastructure (Python microservices, Agentic AI, MCP backend)

# Phase 1 (slot triage) draft expected outcomes: one baseline bullet against
# one posting. `expected_labels` is a list of PERMITTED labels - a list with
# more than one entry means the pairing is deliberately ambiguous, not that
# the reviewer must pick one.
triage_examples:
  - posting_id: ml_research
    bullet_id: constrained_optimization_for_generative_classification_b1
    expected_labels: [keep]
    rationale: >
      Direct, strong match: "flow-based generative classifier" + "constrained
      optimization" + "jointly optimize predictive accuracy and probabilistic
      calibration" line up almost one-to-one with the posting's own core
      requirements. This is the fixture's canonical "strong keep" example.
  - posting_id: ml_research
    bullet_id: constrained_optimization_for_generative_classification_b3
    expected_labels: [keep]
    rationale: >
      The posting explicitly asks for calibration (ECE) and generative-
      quality reporting alongside accuracy; this bullet's ECE/accuracy
      metrics on MNIST are exactly that kind of evidence.
  - posting_id: ml_research
    bullet_id: constrained_optimization_for_generative_classification_b2
    expected_labels: [keep]
    rationale: >
      The posting explicitly asks for "a configurable experimentation
      framework (e.g. Hydra-style configs)" and "experiment tracking tools
      (e.g. Weights & Biases)" - a near-verbatim match to this bullet.

  - posting_id: frontend_product
    bullet_id: constrained_optimization_for_generative_classification_b1
    expected_labels: [candidate_for_replacement]
    rationale: >
      A frontend/product posting has no use for flow-based generative-
      classifier research; this mirrors the dev plan's own canonical
      example ("a frontend posting paired with a research/ML bullet
      expected to be candidate_for_replacement").
  - posting_id: frontend_product
    bullet_id: constrained_optimization_for_generative_classification_b4
    expected_labels: [candidate_for_replacement, deprioritize]
    rationale: >
      "SOTA generative quality (bits/dim)" is a pure ML-research metric with
      no frontend/product relevance - a clean replacement/deprioritize
      target either way.

  - posting_id: backend_platform
    bullet_id: constrained_optimization_for_generative_classification_b2
    expected_labels: [deprioritize, idk]
    rationale: >
      The posting wants general entry-level SWE fundamentals (OOP, data
      structures, algorithms, git); this bullet's Python/experimentation-
      framework content has a plausible but weak Python-only overlap -
      genuinely ambiguous rather than a clean keep or a clean replace.
  - posting_id: backend_platform
    bullet_id: constrained_optimization_for_generative_classification_b3
    expected_labels: [candidate_for_replacement, deprioritize]
    rationale: >
      Calibration/ECE/MNIST-accuracy reporting is research-metric-specific
      and has no clear connection to general entry-level software
      engineering fundamentals.

  - posting_id: llm_ml_infra
    bullet_id: constrained_optimization_for_generative_classification_b2
    expected_labels: [deprioritize, idk]
    rationale: >
      The posting wants Python backend/microservices/Agentic-AI/MCP
      experience; this bullet's Python experimentation-framework work is
      adjacent (same language, both "engineering process" flavored) but
      not the same domain - genuinely ambiguous.
  - posting_id: llm_ml_infra
    bullet_id: constrained_optimization_for_generative_classification_b1
    expected_labels: [candidate_for_replacement, deprioritize]
    rationale: >
      Generative-classifier research is not backend/microservices/Agentic-
      AI engineering; a plausible replacement/deprioritize target for a
      posting this specifically infra-focused.

# Phase 2 (project fact retrieval) draft expectations. Deliberately minimal
# while only one project is in scope: with a single active project, EVERY
# posting's acceptable fact pool is trivially that one project, and there is
# no second project to construct a genuine forbidden-cross-project-reuse
# example against. Re-add real cross-project examples once scope widens
# back out to multiple projects (research_assistant/c_discord_bot_platform/
# benchmark_driven_llm_workflow_orchestration data still exists on disk,
# just outside the current resume_manifest.yaml).
fact_pool_examples:
  - posting_id: ml_research
    acceptable_project_ids: [constrained_optimization_for_generative_classification]
    rationale: >
      Only one project is currently in scope; its fact pool is trivially
      the sole acceptable source for any posting until more projects are
      reintroduced into resume_manifest.yaml.
forbidden_cross_project_reuse_examples: []

