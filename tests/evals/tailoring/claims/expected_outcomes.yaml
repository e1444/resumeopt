# DRAFT ground truth - NOT yet human-reviewed. Per AGENTS.md Human Review
# Gates and the Fixture-First Phase Method: for open-ended generation,
# fixtures define only SEPARABLE HARD CONSTRAINTS and allowed ambiguity,
# never an exhaustive expected claim set.
_review_status: draft_needs_human_review

cases:
  - id: frontend_backend_no_merge
    fact_atoms_path: tests/evals/tailoring/claims/frontend_backend_no_merge_fact_atoms.yaml
    hard_constraints:
      - No single claim may cite supporting_fact_ids spanning BOTH the
        frontend group (demo_fullstack_project_fact_001/002/003) and the
        backend group (demo_fullstack_project_fact_004/005/006).
    allowed_ambiguity: >
      Any number of claims (0 or more) is acceptable as long as the hard
      constraint above holds; a frontend-only claim, a backend-only claim,
      both, or neither are all permitted outcomes. The number/grouping of
      claims WITHIN each side (e.g. one combined frontend claim vs. two
      narrower frontend claims) is not prescribed.
    rationale: >
      Frontend UI work and backend service/database work are genuinely
      different system boundaries/accomplishments - merging them into one
      claim would misrepresent the work as a single achievement when it is
      really two. This is the dev plan's own canonical Phase 3 fixture
      requirement ("distinct frontend and backend work must not merge").

  - id: noise_unused
    fact_atoms_path: tests/evals/tailoring/claims/noise_unused_fact_atoms.yaml
    hard_constraints:
      - demo_noise_project_fact_004 (town hall) and
        demo_noise_project_fact_005 (holiday party) must NEVER appear in
        any claim's supporting_fact_ids.
    allowed_ambiguity: >
      Any grouping of the 3 genuinely coherent ETL/Airflow facts
      (fact_001/002/003) into 1-3 claims is acceptable, as long as the
      injected noise facts are never cited.
    rationale: >
      The two noise facts describe genuine workplace events but have no
      skill_tags and no thematic relation to the ETL/data-engineering
      facts - a coherent-grouping generator should never find a reason to
      cite them.

  - id: no_coherent_grouping
    fact_atoms_path: tests/evals/tailoring/claims/no_coherent_grouping_fact_atoms.yaml
    hard_constraints:
      - No claim may cite supporting_fact_ids spanning more than one of
        these 3 facts (they share no skill_tags and no thematic overlap -
        merging any two into one claim would be a fabricated connection).
    allowed_ambiguity: >
      The dev plan's own fixture wording ("a pool with no coherent
      grouping must permit no claim") is the PREFERRED outcome (0 claims),
      but each individual fact is a genuine, standalone, if thin,
      accomplishment - up to 3 trivial single-fact claims (one per fact,
      never merged, never embellished beyond the fact's own wording) is an
      explicitly PERMITTED alternative outcome for this fixture, not a
      failure, since forcing 0 output when a single fact IS independently
      true is arguably over-conservative. What must NOT happen is any
      claim inventing a connection between two or more of these facts.
    rationale: >
      These 3 facts are deliberately unrelated one-off items (a single
      conference talk, a certification, one quarter of mentoring) with no
      shared skill_tags - there is no genuine multi-fact story to tell
      here, only three independently-true but thin, disconnected facts.
