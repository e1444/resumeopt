# Phase 3.8 (nucleus-first claim formulation) fixture package.
#
# DRAFT ground truth - NOT yet human-reviewed. Per AGENTS.md's Fixture-
# First Phase Method and Human Review Gates: this file states only
# SEPARABLE hard constraints and explicitly ALLOWED ambiguity, with the
# rationale a reviewer should use - it does not pretend to supply one
# exhaustive "correct" nucleus wording, since bullet-quality/framing is
# inherently holistic and not mechanically scorable (see the dev plan's
# Phase 3.8 background section and the "not an evaluatable fixture" note
# that motivated this whole design direction).
#
# Scope note: this fixture package is scoped ONLY to the NEW dimension
# Phase 3.8 adds - nucleus (why/result) articulation quality. Atomicity
# (never merging genuinely different deliverables into one claim) is
# NOT re-tested here; that is already covered by the existing, previously
# human-reviewed tests/evals/tailoring/claims/ fixture set, and Phase
# 3.8's Validation Gate requires re-running THAT existing fixture set
# unchanged as a regression check, not duplicating it here.
_review_status: draft_needs_human_review

cases:
  - id: scale_reliability_why_equals_result
    fact_atoms_path: tests/evals/tailoring/claims_nucleus/scale_reliability_fact_atoms.yaml
    nucleus_shape: why_equals_result
    hard_constraints:
      - demo_scale_reliability_project_fact_004 (the lunch-and-learn aside)
        must never appear in any claim's supporting_fact_ids alongside the
        queue-reliability facts (fact_001/002/003) - it is a genuine but
        unrelated one-off aside, same convention as every other Phase 3
        fixture's noise fact.
    allowed_ambiguity: >
      The nucleus's `why` and `result` fields are expected to fully
      collapse into one abstract idea here (e.g. why="ensuring the system
      reliably absorbs bursty/high-volume load" and result restating the
      same idea, or result left empty/identical to why) - NOT a distinct
      why followed by a separately-stated numeric result, since none of
      the 3 core facts states a clean standalone metric (fact_003's
      "sustained processing... without dropping a single job" is itself
      part of the same reliability claim, not an independent outcome).
      Exact wording of `why`/`result` is not prescribed; a reviewer should
      check that the SHAPE (collapsed, not artificially split into two
      unrelated ideas) matches this expectation, not a specific sentence.
    rationale: >
      Mirrors the human-identified real-world pattern where why and
      result are the same idea restated ("supporting high-volume traffic"
      / "robustness") rather than two separable ingredients - this case
      exists specifically to check the generator does not force an
      artificial, fabricated `result` distinct from the `why` when the
      underlying facts do not actually support one.

  - id: iterative_development_why_plus_separate_result
    fact_atoms_path: tests/evals/tailoring/claims_nucleus/iterative_development_fact_atoms.yaml
    nucleus_shape: why_plus_separate_result
    hard_constraints:
      - demo_iterative_dev_project_fact_004 (the expense-report aside)
        must never appear in any claim's supporting_fact_ids alongside
        the test-driven-development facts (fact_001/002/003).
    allowed_ambiguity: >
      `why` and `result` are expected to be genuinely DISTINCT here: why
      centers on the methodology/practice (test-first, iterative
      development), and result centers on the separate, concrete payoff
      fact_003 actually states (3 prototype features shipped within a
      single week / fast iteration). Exact wording is not prescribed, but
      a reviewer should check the result is not just a restatement of the
      why in different words - it should name the distinct payoff
      fact_003 actually provides.
    rationale: >
      Mirrors the human-identified "why + separate result" pattern
      (methodology -> outcome), the counterpart to the previous
      why-equals-result case - tests that the generator can also produce
      a genuinely two-part nucleus when the facts actually support one,
      rather than defaulting to always collapsing why/result into one
      idea regardless of what the facts say.

  - id: configurability_ux_why_alone_no_result
    fact_atoms_path: tests/evals/tailoring/claims_nucleus/configurability_ux_fact_atoms.yaml
    nucleus_shape: why_alone_no_result
    hard_constraints:
      - demo_configurable_ux_project_fact_004 (the accessibility workshop
        aside) must never appear in any claim's supporting_fact_ids
        alongside the settings-panel facts (fact_001/002/003).
      - The generated nucleus's `result` field must be genuinely absent
        (null/empty), NOT a fabricated metric - none of the 3 core facts
        states any measurable outcome (adoption rate, time saved, etc.),
        only a description of the capability itself.
    allowed_ambiguity: >
      `why` wording is not prescribed (e.g. "improving user-facing
      configurability/personalization" or similar), as long as it
      reflects the capability these facts jointly describe (a
      customizable settings panel), not an invented business outcome.
    rationale: >
      Mirrors the human-identified "why alone, no result" pattern (e.g.
      "front-end UI/UX") - this is the fixture's explicit NEGATIVE CONTROL
      against result-fabrication: a generator that always invents a
      plausible-sounding result even when the facts do not support one
      would fail this case's second hard constraint.

  - id: selfhealing_pipeline_ambiguous_shape
    fact_atoms_path: tests/evals/tailoring/claims_nucleus/ambiguous_selfhealing_pipeline_fact_atoms.yaml
    nucleus_shape: ambiguous
    allowed_outcomes: [why_equals_result, why_plus_separate_result]
    hard_constraints:
      - demo_selfhealing_pipeline_project_fact_004 (the unrelated PR
        review aside) must never appear in any claim's supporting_fact_ids
        alongside the pipeline-migration facts (fact_001/002/003).
    allowed_ambiguity: >
      EITHER nucleus shape is acceptable and must be recorded with its own
      rationale, not silently defaulted: (a) why_equals_result, e.g.
      why="building a self-healing, event-driven data pipeline" with
      result collapsing into the same idea (fact_003's recovery-time
      figure read as just supporting detail for the same self-healing
      claim); or (b) why_plus_separate_result, e.g.
      why="moving from cron-scheduled batch jobs to an event-driven
      architecture" with a separately-stated result="automatic failure
      recovery, dropping recovery time from ~30 minutes to instant"
      (fact_003 read as its own distinct payoff). Both are defensible
      readings of the same 3 facts.
    rationale: >
      Deliberately ambiguous, mirroring this project's established
      practice (e.g. Phase 6's ambiguous Kubernetes-migration pair) of
      permitting either outcome for a genuinely double-readable case
      rather than forcing one, as long as the choice is explained.
