# DRAFT ground truth - NOT yet human-reviewed. Per AGENTS.md Human Review
# Gates and the Fixture-First Phase Method: separable hard constraints and
# allowed ambiguity, not one exhaustive expected-decision set.
_review_status: draft_needs_human_review

cases:
  - case_id: backend_claim_support_pool
    fact_atoms_path: tests/evals/tailoring/expansion/backend_claim_fact_atoms.yaml

    hard_constraints:
      - demo_expansion_project_fact_004 (the React/frontend dashboard fact) must
        NEVER appear in added_support_fact_ids - it belongs to a different
        (frontend) accomplishment, not this backend claim.
      - demo_expansion_project_fact_006 (the unrelated marketing landing page)
        must NEVER appear in added_support_fact_ids - it is irrelevant to this
        claim and to this project's backend work entirely.
      - len(added_support_fact_ids) must never exceed MAX_SUPPORT_ADDITIONS (3).
      - build_support_pool's returned pool must never exceed MAX_SUPPORT_POOL_SIZE
        (4) candidates, and must never include fact_001/002/003 (already used
        by the core claim).

    allowed_ambiguity: >
      demo_expansion_project_fact_005 (the OpenAPI-schema-for-frontend-
      consumption fact) is the deliberately SUBTLE case the dev plan's
      validation gate calls for: it is fundamentally a BACKEND-side deliverable
      (the API contract/documentation the backend engineer produced) that only
      MENTIONS frontend consumption as its purpose. Either add_support or
      keep_out is an acceptable outcome for this fact - the point of this
      fixture case is to inspect the model's stated reasoning for whichever way
      it decides, not to force one answer. What is NOT acceptable: deciding
      add_support with reasoning that treats it as a frontend accomplishment
      (that would indicate the model is not distinguishing "mentions frontend"
      from "is frontend work").

    rationale: >
      Directly implements the dev plan's own Phase 4 fixture requirement
      verbatim: "an obvious adjacent-frontend fact that should support a
      frontend claim" (fact_004 - obviously excluded from THIS backend claim
      because it belongs to a different, frontend claim), "a subtle
      same-project frontend fact that may support a backend claim only when
      needed to establish one implementation boundary" (fact_005 - the API
      contract), and "an irrelevant or cross-project frontend fact that must
      remain excluded from a backend claim" (fact_006 - the marketing page).

  - case_id: generative_model_claim_different_measurement_axis
    fact_atoms_path: tests/evals/tailoring/expansion/generative_model_claim_fact_atoms.yaml

    hard_constraints:
      - This fixture's core claim (fact_001+002) and its 2 candidates
        (fact_003, fact_004) are ALL results of the exact same underlying
        model/method - there is no genuinely different deliverable in this
        fixture to test hard exclusion against (that boundary is already
        covered by backend_claim_support_pool above, which is unaffected by
        the Phase 3.7 reframe below). No hard exclusion constraint applies
        to this fixture's candidates as of Phase 3.7.

    allowed_ambiguity: >
      Per the Phase 3.7 mergeability reframe, BOTH demo_generative_model_project_fact_003
      (98.5% classification accuracy) and demo_generative_model_project_fact_004
      (a variational-dequantization training technique) describe a different
      measured dimension or contributing detail of the SAME underlying model
      as the core claim, and a broadened restatement covering either (or
      both) still reads as one coherent claim about that model's combined
      strengths - both are now expected to be judged MERGEABLE (add_support)
      more often than not, though either individual candidate reasonably
      being excluded on a given run is not itself a failure (this is judged
      by repeated-run consistency, not a single sample, per the Phase 3.6/3.7
      validation gate).

    rationale: >
      Originally written (Phase 3.6) to encode a HARD exclusion of fact_003,
      reproducing a live finding that a claim narrowly worded around one
      measured axis (generative quality) got a consistent "different
      accomplishment" verdict when a second axis (classification accuracy)
      of the SAME model was proposed as support. Phase 3.7 revisited that
      premise: the real project this fixture mirrors explicitly states (in
      its own fact_002) that its method JOINTLY optimizes predictive accuracy
      and calibration - meaning the "hard exclusion" baked into the original
      version of this fixture was itself an artifact of an artificially
      narrow test claim (built from only 2 of the project's facts), not a
      reflection of the real underlying accomplishment's true scope. The
      fixture is retained, with its constraint inverted, specifically so
      this correction stays a durable, documented decision rather than a
      silently-forgotten one.


